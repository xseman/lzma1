name: Release Please

on:
    push:
        branches:
            - master
    workflow_dispatch:
        inputs:
            npm_release:
                description: "Publish npm package"
                type: boolean
                default: false
            npm_tag:
                description: "Tag or ref to publish from (e.g., v0.1.0)"
                type: string
                required: false

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    release-please:
        name: Release Please
        runs-on: ubuntu-latest
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
            version: ${{ steps.release.outputs.version }}
        steps:
            - uses: googleapis/release-please-action@v4
              id: release
              with:
                  config-file: .github/.release-config.json
                  manifest-file: .github/.release-manifest.json
                  token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

    publish:
        name: Publish To npm
        needs: release-please
        if: ${{ (github.event_name == 'push' && needs.release-please.outputs.release_created) || (github.event_name == 'workflow_dispatch' && inputs.npm_release == true) }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6
              if: ${{ github.event_name == 'push' || inputs.npm_tag == '' }}

            - uses: actions/checkout@v6
              if: ${{ github.event_name == 'workflow_dispatch' && inputs.npm_tag != '' }}
              with:
                  ref: ${{ inputs.npm_tag }}

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: "https://registry.npmjs.org"

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build package
              run: bun run build

            - name: Publish package
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: npm publish --provenance --access public
